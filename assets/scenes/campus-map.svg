<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义符号与渐变 -->
  <defs>
    <!-- 樱花符号 -->
    <symbol id="sakura" viewBox="0 0 20 20">
      <circle cx="10" cy="4" r="3.5" fill="#FFB7C5"/>
      <circle cx="14.8" cy="7.2" r="3.5" fill="#FFB7C5"/>
      <circle cx="13" cy="12.5" r="3.5" fill="#FFB7C5"/>
      <circle cx="7" cy="12.5" r="3.5" fill="#FFB7C5"/>
      <circle cx="5.2" cy="7.2" r="3.5" fill="#FFB7C5"/>
      <circle cx="10" cy="9" r="2" fill="#FFCDD2"/>
    </symbol>
    <!-- 水面渐变 -->
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <!-- 草坪渐变 -->
    <radialGradient id="lawnGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#A5D6A7"/>
    </radialGradient>
  </defs>
  
  <!-- 背景天空与云朵 -->
  <rect width="1600" height="1000" fill="#FFF8F0"/>
  <circle cx="200" cy="80" r="60" fill="white" opacity="0.8"/>
  <circle cx="240" cy="75" r="50" fill="white" opacity="0.8"/>
  <circle cx="180" cy="95" r="45" fill="white" opacity="0.8"/>
  <circle cx="1350" cy="120" r="55" fill="white" opacity="0.8"/>
  <circle cx="1390" cy="115" r="45" fill="white" opacity="0.8"/>
  <circle cx="1330" cy="135" r="40" fill="white" opacity="0.8"/>
  
  <!-- 全局路径（浅米色） -->
  <path d="M 100,600 Q 300,550 450,500 T 700,450 T 950,550 T 1200,650 T 1500,700" stroke="#FAF3E0" stroke-width="30" fill="none" stroke-linecap="round"/>
  <path d="M 450,500 Q 500,350 600,300 T 800,200" stroke="#FAF3E0" stroke-width="25" fill="none" stroke-linecap="round"/>
  <path d="M 700,450 L 700,200" stroke="#FAF3E0" stroke-width="20" fill="none" stroke-linecap="round"/>
  
  <!-- 1. 教学楼 (building-jiaoxue) - 左上区 -->
  <g id="building-jiaoxue" transform="translate(120, 150)">
    <!-- 楼体 -->
    <rect x="0" y="0" width="200" height="150" rx="5" fill="#FFE0B2"/>
    <!-- 暖橙色屋顶 -->
    <polygon points="0,0 100,-40 200,0" fill="#FF9800"/>
    <!-- 窗户格子 -->
    <rect x="15" y="30" width="30" height="40" rx="3" fill="#FFF9C4"/>
    <rect x="55" y="30" width="30" height="40" rx="3" fill="#FFF9C4"/>
    <rect x="95" y="30" width="30" height="40" rx="3" fill="#FFF9C4"/>
    <rect x="135" y="30" width="30" height="40" rx="3" fill="#FFF9C4"/>
    <rect x="15" y="90" width="30" height="40" rx="3" fill="#FFF9C4"/>
    <rect x="55" y="90" width="30" height="40" rx="3" fill="#FFF9C4"/>
    <rect x="95" y="90" width="30" height="40" rx="3" fill="#FFF9C4"/>
    <rect x="135" y="90" width="30" height="40" rx="3" fill="#FFF9C4"/>
    <!-- 窗框 -->
    <line x1="30" y1="30" x2="30" y2="70" stroke="#BDBDBD" stroke-width="1.5"/>
    <line x1="15" y1="50" x2="45" y2="50" stroke="#BDBDBD" stroke-width="1.5"/>
    <!-- 其他窗户同样处理，略 -->
    <rect x="165" y="70" width="20" height="25" rx="2" fill="#FFCC80"/>
    <!-- 门 -->
    <rect x="85" y="115" width="30" height="35" rx="3" fill="#FFCC80"/>
  </g>
  
  <!-- 2. 图书馆 (building-tushuguan) - 左中区 -->
  <g id="building-tushuguan" transform="translate(350, 250)">
    <rect x="0" y="0" width="180" height="120" rx="5" fill="#E3F2FD"/>
    <!-- 灰蓝屋顶 -->
    <polygon points="0,0 90,-35 180,0" fill="#90A4AE"/>
    <!-- 大窗户 -->
    <rect x="15" y="20" width="150" height="60" rx="4" fill="#E1F5FE"/>
    <line x1="65" y1="20" x2="65" y2="80" stroke="#B3E5FC" stroke-width="2"/>
    <line x1="115" y1="20" x2="115" y2="80" stroke="#B3E5FC" stroke-width="2"/>
    <line x1="15" y1="50" x2="165" y2="50" stroke="#B3E5FC" stroke-width="2"/>
    <!-- 门 -->
    <rect x="70" y="85" width="40" height="35" rx="3" fill="#BBDEFB"/>
  </g>
  
  <!-- 3. 食堂 (building-shitang) - 中下区 -->
  <g id="building-shitang" transform="translate(550, 480)">
    <rect x="0" y="0" width="220" height="100" rx="5" fill="#FFF9C4"/>
    <!-- 米黄屋顶 -->
    <rect x="-5" y="-15" width="230" height="20" rx="10" fill="#F0E68C"/>
    <!-- 小烟囱 -->
    <rect x="180" y="-30" width="20" height="25" fill="#BDBDBD"/>
    <rect x="178" y="-35" width="24" height="8" fill="#BDBDBD"/>
    <!-- 窗户 -->
    <rect x="10" y="20" width="40" height="30" rx="3" fill="#FFFDE7"/>
    <rect x="60" y="20" width="40" height="30" rx="3" fill="#FFFDE7"/>
    <rect x="110" y="20" width="40" height="30" rx="3" fill="#FFFDE7"/>
    <!-- 门 -->
    <rect x="170" y="20" width="30" height="55" rx="3" fill="#FFE082"/>
  </g>
  
  <!-- 4. 体育馆 (building-tiyuguan) - 右上区 -->
  <g id="building-tiyuguan" transform="translate(1200, 100)">
    <!-- 主体 -->
    <rect x="0" y="40" width="200" height="100" rx="5" fill="#E1F5FE"/>
    <!-- 蓝白色圆顶穹顶 -->
    <ellipse cx="100" cy="40" rx="110" ry="40" fill="#E3F2FD"/>
    <ellipse cx="100" cy="40" rx="90" ry="30" fill="white"/>
    <!-- 顶部装饰 -->
    <circle cx="100" cy="15" r="10" fill="#64B5F6"/>
    <!-- 大门 -->
    <rect x="70" y="80" width="60" height="60" rx="10" fill="#90CAF9"/>
    <!-- 标志 -->
    <circle cx="100" cy="110" r="15" fill="#E3F2FD"/>
  </g>
  
  <!-- 5. 屋上观星台 (building-wujiang) - 教学楼顶 -->
  <g id="building-wujiang" transform="translate(210, 110)">
    <!-- 在教学楼屋顶的平台 -->
    <rect x="0" y="0" width="80" height="20" rx="3" fill="#FFCC80"/>
    <!-- 栏杆 -->
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#FFB74D" stroke-width="2"/>
    <line x1="80" y1="0" x2="80" y2="-20" stroke="#FFB74D" stroke-width="2"/>
    <line x1="0" y1="-20" x2="80" y2="-20" stroke="#FFB74D" stroke-width="2"/>
    <!-- 望远镜 -->
    <rect x="30" y="-15" width="20" height="10" rx="2" fill="#795548"/>
    <circle cx="40" cy="-20" r="8" fill="#42A5F5" stroke="#1E88E5" stroke-width="2"/>
  </g>
  
  <!-- 6. 河川敷 (building-hechuan) - 右下边缘 -->
  <g id="building-hechuan" transform="translate(1350, 650)">
    <!-- 弯曲河流 -->
    <path d="M 0,0 Q 50,-100 150,-80 T 300,-30" stroke="#81D4FA" stroke-width="40" fill="none" stroke-linecap="round"/>
    <path d="M 0,0 Q 50,-100 150,-80 T 300,-30" stroke="url(#waterGrad)" stroke-width="35" fill="none" stroke-linecap="round"/>
    <!-- 草地 -->
    <ellipse cx="100" cy="-120" rx="60" ry="30" fill="url(#lawnGrad)"/>
    <ellipse cx="250" cy="-60" rx="50" ry="25" fill="url(#lawnGrad)"/>
    <!-- 小桥 -->
    <path d="M 180,-60 L 220,-60 L 210,-80 L 190,-80 Z" fill="#8D6E63"/>
  </g>
  
  <!-- 7. 召唤台 (building-zhaohuan) - 中央广场 -->
  <g id="building-zhaohuan" transform="translate(700, 350)">
    <!-- 圆形广场 -->
    <circle cx="0" cy="0" r="80" fill="#E1BEE7" stroke="#CE93D8" stroke-width="3"/>
    <!-- 魔法阵 -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#BA68C8" stroke-width="2" stroke-dasharray="5,3"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#AB47BC" stroke-width="2"/>
    <circle cx="0" cy="0" r="20" fill="#EDE7F6"/>
    <!-- 符文（简化） -->
    <text x="-5" y="5" font-size="14" fill="#7E57C2" font-family="serif">☆</text>
    <line x1="-50" y1="0" x2="-30" y2="0" stroke="#9C27B0" stroke-width="1.5"/>
    <line x1="30" y1="0" x2="50" y2="0" stroke="#9C27B0" stroke-width="1.5"/>
    <line x1="0" y1="-50" x2="0" y2="-30" stroke="#9C27B0" stroke-width="1.5"/>
    <line x1="0" y1="30" x2="0" y2="50" stroke="#9C27B0" stroke-width="1.5"/>
  </g>
  
  <!-- 8. 走廊 (building-zoulang) - 教学楼到食堂的连廊 -->
  <g id="building-zoulang" transform="translate(320, 400)">
    <!-- 廊道 -->
    <rect x="0" y="0" width="200" height="30" rx="5" fill="#FFECB3"/>
    <!-- 柱子 -->
    <rect x="10" y="-5" width="8" height="40" fill="#FFE082"/>
    <rect x="60" y="-5" width="8" height="40" fill="#FFE082"/>
    <rect x="110" y="-5" width="8" height="40" fill="#FFE082"/>
    <rect x="160" y="-5" width="8" height="40" fill="#FFE082"/>
    <!-- 顶棚 -->
    <rect x="-5" y="-10" width="210" height="15" rx="5" fill="#FFD54F"/>
  </g>
  
  <!-- 9. 家 (building-jia) - 左下角校外小屋 -->
  <g id="building-jia" transform="translate(50, 700)">
    <rect x="0" y="0" width="120" height="80" rx="5" fill="#FFCCBC"/>
    <!-- 三角形屋顶 -->
    <polygon points="0,0 60,-30 120,0" fill="#E57373"/>
    <!-- 烟囱 -->
    <rect x="80" y="-25" width="15" height="30" fill="#BCAAA4"/>
    <!-- 窗户 -->
    <rect x="10" y="20" width="30" height="25" rx="3" fill="#FFF9C4"/>
    <rect x="80" y="20" width="30" height="25" rx="3" fill="#FFF9C4"/>
    <!-- 门 -->
    <rect x="45" y="35" width="25" height="45" rx="3" fill="#A1887F"/>
    <!-- 花园 -->
    <circle cx="20" cy="85" r="5" fill="#FF8A80"/>
    <circle cx="40" cy="88" r="4" fill="#FF80AB"/>
    <circle cx="100" cy="86" r="5" fill="#FF8A80"/>
  </g>
  
  <!-- 10. 办公室 (building-bangong) - 教学楼旁小楼 -->
  <g id="building-bangong" transform="translate(50, 280)">
    <rect x="0" y="0" width="80" height="70" rx="5" fill="#DCEDC8"/>
    <!-- 屋顶 -->
    <rect x="-5" y="-10" width="90" height="15" rx="5" fill="#8BC34A"/>
    <!-- 窗户 -->
    <rect x="10" y="15" width="25" height="20" rx="2" fill="#F1F8E9"/>
    <rect x="45" y="15" width="25" height="20" rx="2" fill="#F1F8E9"/>
    <!-- 门 -->
    <rect x="30" y="40" width="20" height="30" rx="2" fill="#AED581"/>
  </g>
  
  <!-- 11. 校门 (building-damen) - 底部中央 -->
  <g id="building-damen" transform="translate(700, 800)">
    <!-- 门柱 -->
    <rect x="0" y="0" width="30" height="80" rx="3" fill="#D7CCC8"/>
    <rect x="170" y="0" width="30" height="80" rx="3" fill="#D7CCC8"/>
    <!-- 门梁 -->
    <rect x="0" y="-15" width="200" height="20" rx="5" fill="#BCAAA4"/>
    <!-- 校名牌 -->
    <rect x="50" y="-40" width="100" height="25" rx="5" fill="#FFF8E1"/>
    <text x="100" y="-22" text-anchor="middle" font-size="14" fill="#5D4037" font-family="serif" font-weight="bold">星辰高中</text>
    <!-- 侧门 -->
    <rect x="60" y="20" width="80" height="60" rx="5" fill="#8D6E63"/>
    <line x1="100" y1="20" x2="100" y2="80" stroke="#6D4C41" stroke-width="2"/>
  </g>
  
  <!-- 12. 操场 (building-caochang) - 中央 -->
  <g id="building-caochang" transform="translate(700, 550)">
    <!-- 椭圆跑道 -->
    <ellipse cx="0" cy="0" rx="150" ry="80" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="3"/>
    <ellipse cx="0" cy="0" rx="140" ry="70" fill="none" stroke="#C8E6C9" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="120" ry="60" fill="none" stroke="#C8E6C9" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="100" ry="50" fill="none" stroke="#C8E6C9" stroke-width="2"/>
    <!-- 内部草坪 -->
    <ellipse cx="0" cy="0" rx="80" ry="40" fill="#81C784"/>
    <!-- 跑道标记 -->
    <line x1="-140" y1="0" x2="-100" y2="0" stroke="#A5D6A7" stroke-width="2"/>
    <line x1="140" y1="0" x2="100" y2="0" stroke="#A5D6A7" stroke-width="2"/>
    <!-- 看台（简化） -->
    <rect x="-60" y="-90" width="120" height="15" rx="3" fill="#B0BEC5"/>
  </g>
  
  <!-- 路径连接补充（更精细的连接线） -->
  <path d="M 320,550 L 320,650 L 550,650" stroke="#FAF3E0" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M 550,550 L 700,550" stroke="#FAF3E0" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 1050,350 L 1200,350" stroke="#FAF3E0" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M 230,350 L 350,350" stroke="#FAF3E0" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M 230,220 L 230,350" stroke="#FAF3E0" stroke-width="18" fill="none" stroke-linecap="round"/>
  
  <!-- 樱花点缀 -->
  <use href="#sakura" x="180" y="400" width="15" height="15" opacity="0.8"/>
  <use href="#sakura" x="450" y="180" width="12" height="12" opacity="0.9"/>
  <use href="#sakura" x="600" y="100" width="14" height="14" opacity="0.7"/>
  <use href="#sakura" x="850" y="250" width="13" height="13" opacity="0.8"/>
  <use href="#sakura" x="1100" y="400" width="15" height="15" opacity="0.9"/>
  <use href="#sakura" x="1300" y="300" width="12" height="12" opacity="0.8"/>
  <use href="#sakura" x="300" y="550" width="14" height="14" opacity="0.7"/>
  <use href="#sakura" x="950" y="600" width="13" height="13" opacity="0.8"/>
  <use href="#sakura" x="1200" y="550" width="15" height="15" opacity="0.9"/>
  <use href="#sakura" x="150" y="600" width="12" height="12" opacity="0.8"/>
  <use href="#sakura" x="500" y="400" width="11" height="11" opacity="0.7"/>
  <use href="#sakura" x="800" y="150" width="13" height="13" opacity="0.8"/>
  <use href="#sakura" x="1000" y="500" width="14" height="14" opacity="0.9"/>
  <use href="#sakura" x="1400" y="450" width="12" height="12" opacity="0.8"/>
  <use href="#sakura" x="650" y="700" width="13" height="13" opacity="0.7"/>
  <use href="#sakura" x="400" y="700" width="11" height="11" opacity="0.8"/>
  <use href="#sakura" x="1050" y="200" width="12" height="12" opacity="0.9"/>
  
  <!-- 建筑物旁的占位符（白色圆圈） -->
  <circle cx="120" cy="250" r="30" fill="white" stroke="#E0E0E0" stroke-width="1.5" id="slot-jiaoxue"/>
  <circle cx="350" cy="350" r="30" fill="white" stroke="#E0E0E0" stroke-width="1.5" id="slot-tushuguan"/>
  <circle cx="550" cy="550" r="30" fill="white" stroke="#E0E0E0" stroke-width="1.5" id="slot-shitang"/>
  <circle cx="1200" cy="200" r="30" fill="white" stroke="#E0E0E0" stroke-width="1.5" id="slot-tiyuguan"/>
  <circle cx="210" cy="100" r="30" fill="white" stroke="#E0E0E0" stroke-width="1.5" id="slot-wujiang"/>
  <circle cx="1400" cy="600" r="30" fill="white" stroke="#E0E0E0" stroke-width="1.5" id="slot-hechuan"/>
  <circle cx="700" cy="320" r="30" fill="white" stroke="#E0E0E0" stroke-width="1.5" id="slot-zhaohuan"/>
  <circle cx="420" cy="430" r="30" fill="white" stroke="#E0E0E0" stroke-width="1.5" id="slot-zoulang"/>
  <circle cx="50" cy="750" r="30" fill="white" stroke="#E0E0E0" stroke-width="1.5" id="slot-jia"/>
  <circle cx="50" cy="320" r="30" fill="white" stroke="#E0E0E0" stroke-width="1.5" id="slot-bangong"/>
  <circle cx="700" cy="850" r="30" fill="white" stroke="#E0E0E0" stroke-width="1.5" id="slot-damen"/>
  <circle cx="700" cy="520" r="30" fill="white" stroke="#E0E0E0" stroke-width="1.5" id="slot-caochang"/>
</svg>