<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- 背景圆（类别色渐变）-->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#228B22" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#228B22" stop-opacity="0.05"/>
    </radialGradient>
  </defs>
  <rect width="200" height="240" fill="url(#bg)" rx="16"/>

  <!-- 身体（简化 T 恤）-->
  <path d="M 60 160 Q 60 130 100 130 Q 140 130 140 160 L 140 220 L 60 220 Z" fill="#228B22" opacity="0.8" rx="8"/>
  <!-- 脖子 -->
  <rect x="88" y="108" width="24" height="28" fill="#F5DEB3" rx="4"/>

  <!-- 头部（肤色圆）-->
  <circle cx="100" cy="80" r="42" fill="#F5DEB3"/>
  <!-- 头发（顶部弧形，类别色）-->
  <path d="M 58 80 Q 58 35 100 35 Q 142 35 142 80 Q 142 55 100 50 Q 58 55 58 80 Z" fill="#228B22" opacity="0.9"/>

  <!-- 眼睛 -->
  <circle cx="85" cy="78" r="4" fill="#333"/>
  <circle cx="115" cy="78" r="4" fill="#333"/>
  <!-- 微笑 -->
  <path d="M 88 95 Q 100 103 112 95" stroke="#666" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- 装饰：类别 emoji（大号，右上角）-->
  <text x="155" y="50" font-size="28" text-anchor="middle">🎭</text>

  <!-- 类型标签 -->
  <rect x="50" y="225" width="100" height="0" fill="none"/>
  <text x="100" y="235" font-size="14" font-weight="bold" fill="#228B22" text-anchor="middle" font-family="sans-serif">ENFJ</text>
</svg>